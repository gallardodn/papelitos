services:
  app:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
    environment:
      APP_DATA_DIR: /var/www/data
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - ./data:/var/www/data

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "18080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  vendor:

